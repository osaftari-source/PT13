<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#092947">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Portfolio Tracker — OS v13.0.0</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div id="publicShell"></div>
  <div id="app" class="hidden">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="workspace">
      <header class="topbar" id="topbar"></header>
      <main class="page" id="page"></main>
    </div>
    <nav class="mobile-nav" id="mobileNav"></nav>
    <button class="fab" id="fab" type="button" aria-label="Record activity">+</button>
  </div>
  <div id="lockHost"></div>
  <div id="modalHost"></div>
  <div id="toastHost"></div>
</body>
</html>
